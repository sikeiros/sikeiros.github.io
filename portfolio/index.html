<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio</title>
  <meta name="robots" content="noindex, nofollow">
  
  <link rel="stylesheet" href="/styles.css">

  <style>
    html,
    body {
      margin: 0;
      height: 100%;
      background: white;
    }

    .portfolio-page {
      height: 100%;
    }

    .portfolio-topbar {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 1000;
    }

    .portfolio-back {
      display: inline-block;
      padding: 8px 12px;
      text-decoration: none;
      border: 1px solid currentColor;
      background: white;
    }

    .portfolio-back:hover {
      opacity: 0.6;
    }

    .portfolio-pdf {
      width: 100%;
      height: 100vh;
      border: none;
      display: block;
    }
  </style>
</head>
<body>
  <div class="portfolio-page">
    <div class="portfolio-topbar">
      <a href="/" class="portfolio-back">Back to website</a>
    </div>

  <iframe class="pdf" src="A-Danilova-Portfolio.pdf"></iframe>
</body>
</html>
